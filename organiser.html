<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TripMate — Organiser</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep:        #0B2B4E;
      --deep-mid:    #163D63;
      --ocean:       #1A73C0;
      --teal:        #1BAFBF;
      --teal-light:  #E3F7F9;
      --coral:       #D95F42;
      --coral-light: #FDF0EC;
      --bg:          #EEF5FB;
      --card:        #FFFFFF;
      --text:        #0B2342;
      --muted:       #587A9A;
      --border:      #C2D9ED;
      --chosen-bg:   #E3F7F9;
      --divider:     #DCE9F4;
      --radius:      18px;
      --radius-sm:   12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', -apple-system, 'Noto Sans TC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    h1, h2, .headline { font-family: 'Fraunces', 'Noto Sans TC', serif; }

    /* ── Header ───────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 20;
      background: var(--deep);
      padding: 14px 16px 0;
    }
    #brand { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    #brand h1 { font-size: 19px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.2px; }
    #brand .wave { font-size: 20px; }
    .badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
      background: var(--coral); color: #fff;
      padding: 2px 9px; border-radius: 20px;
    }

    #trip-select-wrap { margin-bottom: 10px; }
    #trip-select {
      width: 100%; appearance: none;
      background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: var(--radius-sm);
      padding: 8px 12px; font-size: 13px; font-weight: 700;
      font-family: inherit;
    }
    #trip-select option { color: #000; }

    /* ── Nav pills ────────────────────────────────────── */
    #nav {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px; padding: 4px;
      margin-bottom: 12px;
    }
    .nav-tab {
      flex: 1; padding: 8px 0; font-size: 12.5px; font-weight: 700;
      text-align: center; cursor: pointer;
      color: rgba(255,255,255,0.55);
      border-radius: 999px;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-tab.active { color: var(--deep); background: #FFFFFF; }

    /* ── States ───────────────────────────────────────── */
    #loading, #error-msg {
      text-align: center; padding: 64px 24px; font-size: 14px; color: var(--muted);
    }
    #error-msg { color: var(--coral); }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 14px;
      border: 3px solid var(--divider);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #content { padding: 12px 12px 40px; }

    /* ── Filter chips ─────────────────────────────────── */
    #filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip {
      font-size: 12px; font-weight: 700; padding: 6px 13px;
      border-radius: 999px; background: var(--card); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; user-select: none;
    }
    .chip.active { background: var(--deep); color: #fff; border-color: var(--deep); }

    .no-items { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card.mission { border-left: 4px solid var(--coral); }
    .card.chosen  { background: var(--chosen-bg); border-color: var(--teal); }

    .card-body { padding: 13px 15px; }
    .card-top  { display: flex; align-items: flex-start; gap: 10px; }
    .cat-icon {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: var(--coral-light);
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; word-break: break-word; }
    .card-time  { font-size: 11px; color: var(--muted); margin-bottom: 1px; }
    .card-note  { font-size: 12px; color: #4A6680; margin-top: 5px; white-space: pre-wrap; word-break: break-word; }

    .pill {
      display: inline-block; font-size: 10px; font-weight: 800;
      padding: 2px 8px; border-radius: 20px; margin-left: 5px; vertical-align: middle;
    }
    .pill-untriggered { background: var(--border); color: var(--muted); }
    .pill-triggered   { background: var(--coral-light); color: #B04530; }
    .pill-done        { background: var(--teal-light); color: #0A7A8A; }

    .card-actions { padding: 0 15px 13px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 110px; padding: 10px 12px;
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active:not(:disabled) { opacity: 0.75; transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-coral  { background: var(--coral); color: #fff; }
    .btn-coral-confirm { background: #B04530; color: #fff; }
    .btn-teal   { background: var(--teal);  color: #fff; }
    .btn-ghost  { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-copy   { background: var(--deep-mid); color: #fff; flex: 0 0 auto; min-width: 72px; }

    .alt-header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 4px 3px; font-size: 11px; font-weight: 800; color: var(--teal);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .alt-divider { border: none; border-top: 1px solid var(--divider); margin: 4px 0; }

    /* ── NFC list ─────────────────────────────────────── */
    .nfc-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    }
    .nfc-info { flex: 1; min-width: 0; }
    .nfc-title { font-size: 13.5px; font-weight: 700; }
    .nfc-url { font-size: 11px; color: var(--muted); word-break: break-all; margin-top: 2px; }
    .nfc-missing { font-size: 11px; color: var(--coral); margin-top: 2px; }

    .inline-success { font-size: 13px; font-weight: 700; color: var(--teal); }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--deep); color: #fff; font-size: 13px; font-weight: 700;
      padding: 10px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; z-index: 50;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="header">
  <div id="brand">
    <span class="wave">🌊</span>
    <h1>TripMate</h1>
    <span class="badge">ORGANISER</span>
  </div>
  <div id="trip-select-wrap">
    <select id="trip-select" onchange="onTripChange(this.value)"><option>載入行程中…</option></select>
  </div>
  <div id="nav">
    <div class="nav-tab active" data-tab="missions" onclick="switchTab('missions')">任務</div>
    <div class="nav-tab"        data-tab="restaurants" onclick="switchTab('restaurants')">餐廳</div>
    <div class="nav-tab"        data-tab="nfc" onclick="switchTab('nfc')">NFC 連結</div>
  </div>
</div>

<div id="loading"><div class="spinner"></div>載入中…</div>
<div id="error-msg" style="display:none"></div>
<div id="content" style="display:none"></div>
<div id="toast" class="toast"></div>

<script>
// ── CONFIG — only non-secret values live here ────────────────────────────────
const CONFIG = {
  liffId: '2010468064-4RvCpshe',
  gasUrl: 'https://script.google.com/macros/s/AKfycbx4yqj479yhsIAOUBkIWFKNvlKFnTCVZQ18uyiaxXtoGXJURpZ0bw26zgBsiqYu2rjQ/exec'
  // No secret here — GAS validates your LINE userId instead (set by liff.getProfile)
};
// ─────────────────────────────────────────────────────────────────────────────

const EMOJI = {
  'Transportation':'🚌','Attraction':'🏛️','Restaurant':'🍽️','Shopping':'🛍️',
  'Accommodation':'🏨','Note':'📝','Task':'📋','Mission':'🎯'
};

let currentUser   = null;
let currentTab    = 'missions';
let missionFilter = 'all'; // all | today | pending | done
let currentTrip   = null;
let viewData      = { missions: [], altGroups: [], today: '' };
let pendingSend   = null; // rowIndex awaiting second confirm tap

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    await liff.init({ liffId: CONFIG.liffId });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    currentUser   = { userId: profile.userId, displayName: profile.displayName };

    await loadTrips();
  } catch (err) {
    showError('初始化失敗: ' + err.message);
  }
}

async function loadTrips() {
  const userId = currentUser.userId;
  const url = CONFIG.gasUrl + '?action=getTrips&userId=' + encodeURIComponent(userId);
  const data = await fetch(url).then(r => r.json());
  if (data.error) throw new Error(data.error);

  const sel = document.getElementById('trip-select');
  const trips = data.trips || [];
  if (!trips.length) {
    sel.innerHTML = '<option value="">尚無行程</option>';
  } else {
    sel.innerHTML = trips.map(t =>
      '<option value="' + esc(t['Trip']) + '">' + esc(t['Trip']) +
      (t['Trip'] === data.activeTrip ? '　★' : '') + '</option>'
    ).join('');
  }
  currentTrip = (data.activeTrip && trips.some(t => t['Trip'] === data.activeTrip))
    ? data.activeTrip
    : (trips[0] ? trips[0]['Trip'] : null);
  sel.value = currentTrip || '';

  if (currentTrip) await loadOrganizerView(currentTrip);
  else showError('尚未設定任何行程，請先匯入行程資料。');
}

async function onTripChange(trip) {
  currentTrip = trip;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  await loadOrganizerView(trip);
}

async function loadOrganizerView(trip) {
  try {
    const userId = currentUser.userId;
    const url = CONFIG.gasUrl + '?action=getOrganizerView&trip=' + encodeURIComponent(trip) +
                '&userId=' + encodeURIComponent(userId);
    const data = await fetch(url).then(r => r.json());
    if (data.error) throw new Error(data.error);

    viewData = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  } catch (err) {
    showError('無法載入資料: ' + err.message);
  }
}

async function callPost(body) {
  const res = await fetch(CONFIG.gasUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, userId: currentUser ? currentUser.userId : '' })
  });
  return res.json();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  render();
}

function setMissionFilter(f) {
  missionFilter = f;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const el = document.getElementById('content');
  el.innerHTML = '';

  if (currentTab === 'missions') el.appendChild(renderMissions());
  else if (currentTab === 'restaurants') el.appendChild(renderRestaurants());
  else el.appendChild(renderNfc());
}

function renderMissions() {
  const wrap = document.createElement('div');

  const filters = document.createElement('div');
  filters.id = 'filters';
  const filterDefs = [['all','全部'], ['today','今天'], ['pending','待推送'], ['done','已完成']];
  filters.innerHTML = filterDefs.map(([key, label]) =>
    '<div class="chip' + (missionFilter === key ? ' active' : '') + '" onclick="setMissionFilter(\'' + key + '\')">' + label + '</div>'
  ).join('');
  wrap.appendChild(filters);

  let missions = viewData.missions || [];
  const today = viewData.today || '';
  if (missionFilter === 'today') {
    missions = missions.filter(m => String(m['Start Time'] || '').replace(/-/g,'/').slice(0,10) === today
      || String(m['Mission Start Time'] || '').replace(/-/g,'/').slice(0,10) === today);
  } else if (missionFilter === 'pending') {
    missions = missions.filter(m => !m['Triggered At'] && !m['Completed At']);
  } else if (missionFilter === 'done') {
    missions = missions.filter(m => !!m['Completed At']);
  }

  if (!missions.length) {
    const empty = document.createElement('div');
    empty.className = 'no-items';
    empty.textContent = '🎯 沒有符合條件的任務';
    wrap.appendChild(empty);
    return wrap;
  }

  missions.forEach(m => wrap.appendChild(buildMissionCard(m)));
  return wrap;
}

function buildMissionCard(item) {
  const rowIndex = item['_rowIndex'] || 0;
  const isDone = !!item['Completed At'];
  const isSent = !!item['Triggered At'];
  const note   = (item['Note'] || '').trim();
  const timeStr = fmtTime(item['Mission Start Time'] || item['Start Time'], item['End Time']);

  const statusPill = isDone
    ? '<span class="pill pill-done">✓ 已完成</span>'
    : isSent
      ? '<span class="pill pill-triggered">已推送</span>'
      : '<span class="pill pill-untriggered">未觸發</span>';

  const card = document.createElement('div');
  card.className = 'card mission';

  card.innerHTML =
    '<div class="card-body">' +
      '<div class="card-top">' +
        '<div class="cat-icon">🎯</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + esc(item['Item'] || '') + statusPill + '</div>' +
          (timeStr ? '<div class="card-time">🕐 ' + timeStr + '</div>' : '') +
          (note ? '<div class="card-note">' + esc(note) + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';

  if (!isDone) {
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const isPendingConfirm = pendingSend === rowIndex;
    actions.innerHTML =
      '<button class="btn ' + (isPendingConfirm ? 'btn-coral-confirm' : 'btn-coral') + '" ' +
      'onclick="onSendNowClick(' + rowIndex + ', this)">' +
      (isPendingConfirm ? '再按一次確認送出' : (isSent ? '重新推送' : '立即推送')) +
      '</button>';
    card.appendChild(actions);
  }

  return card;
}

function renderRestaurants() {
  const wrap = document.createElement('div');
  const groups = viewData.altGroups || [];

  if (!groups.length) {
    const empty = document.createElement('div');
    empty.className = 'no-items';
    empty.textContent = '🍽️ 今天沒有需要選擇的餐廳';
    return (wrap.appendChild(empty), wrap);
  }

  groups.forEach(g => {
    const time = fmtTime(g.members[0]['Start Time'], g.members[0]['End Time']);
    const hdr = document.createElement('div');
    hdr.className = 'alt-header';
    hdr.textContent = '🍽️ 餐廳選擇' + (time ? '  ·  ' + time : '');
    wrap.appendChild(hdr);

    g.members.forEach((m, i) => {
      if (i > 0) { const hr = document.createElement('hr'); hr.className = 'alt-divider'; wrap.appendChild(hr); }
      wrap.appendChild(buildRestaurantCard(m, g.id));
    });
  });

  return wrap;
}

function buildRestaurantCard(item, altGroupId) {
  const rowIndex = item['_rowIndex'] || 0;
  const isChosen = item['Is Chosen'] === true || item['Is Chosen'] === 'true';
  const note = (item['Note'] || '').trim();
  const timeStr = fmtTime(item['Start Time'], item['End Time']);

  const card = document.createElement('div');
  card.className = 'card' + (isChosen ? ' chosen' : '');
  card.innerHTML =
    '<div class="card-body">' +
      '<div class="card-top">' +
        '<div class="cat-icon">🍽️</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + esc(item['Item'] || '') + (isChosen ? '<span class="pill pill-done">✓ 已選</span>' : '') + '</div>' +
          (timeStr ? '<div class="card-time">🕐 ' + timeStr + '</div>' : '') +
          (note ? '<div class="card-note">' + esc(note) + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  actions.innerHTML = isChosen
    ? '<span class="inline-success">✓ 已選這家</span>'
    : '<button class="btn btn-teal" onclick="chooseRestaurant(' + rowIndex + ', \'' + esc(altGroupId) + '\', this)">選這家</button>';
  card.appendChild(actions);

  return card;
}

function renderNfc() {
  const wrap = document.createElement('div');
  const missions = viewData.missions || [];

  if (!missions.length) {
    const empty = document.createElement('div');
    empty.className = 'no-items';
    empty.textContent = '📎 尚無任務';
    return (wrap.appendChild(empty), wrap);
  }

  missions.forEach(m => {
    const url = (m['LIFF URL'] || '').trim();
    const row = document.createElement('div');
    row.className = 'nfc-row';
    row.innerHTML =
      '<div class="nfc-info">' +
        '<div class="nfc-title">🎯 ' + esc(m['Item'] || '') + '</div>' +
        (url ? '<div class="nfc-url">' + esc(url) + '</div>'
             : '<div class="nfc-missing">尚未產生連結 — 請於 GAS 執行「Auto-fill LIFF URLs」</div>') +
      '</div>' +
      (url ? '<button class="btn btn-copy" onclick="copyUrl(\'' + esc(url) + '\', this)">複製連結</button>' : '');
    wrap.appendChild(row);
  });

  return wrap;
}

// ── Actions ───────────────────────────────────────────────────────────────────

// Two-tap confirmation — window.confirm() is silently suppressed inside the
// LINE in-app browser (always returns false), so a native confirm dialog
// can never be used here. First tap arms the button; a second tap on the
// same row within a few seconds actually sends.
function onSendNowClick(rowIndex, btn) {
  if (pendingSend === rowIndex) {
    sendNow(rowIndex, btn);
  } else {
    pendingSend = rowIndex;
    render();
    setTimeout(() => { if (pendingSend === rowIndex) { pendingSend = null; render(); } }, 4000);
  }
}

async function sendNow(rowIndex, btn) {
  pendingSend = null;
  btn.disabled = true;
  btn.textContent = '送出中…';
  try {
    const result = await callPost({ action: 'sendNow', rowIndex });
    if (result.ok) {
      showToast('✓ 已推送任務通知');
      const m = (viewData.missions || []).find(x => x['_rowIndex'] === rowIndex);
      if (m) m['Triggered At'] = result.triggeredAt;
      render();
    } else {
      alert('錯誤: ' + (result.error || '請稍後再試'));
      render();
    }
  } catch (err) {
    alert('網路錯誤: ' + err.message);
    render();
  }
}

async function chooseRestaurant(rowIndex, altGroupId, btn) {
  btn.disabled = true;
  btn.textContent = '選擇中…';
  try {
    const result = await callPost({ action: 'chooseRestaurant', rowIndex, altGroupId });
    if (result.ok) {
      await loadOrganizerView(currentTrip);
      showToast('✓ 已更新選擇');
    } else {
      btn.disabled = false; btn.textContent = '選這家';
      alert('錯誤: ' + (result.error || '請稍後再試'));
    }
  } catch (err) {
    btn.disabled = false; btn.textContent = '選這家';
    alert('網路錯誤: ' + err.message);
  }
}

function copyUrl(url, btn) {
  const done = () => { const old = btn.textContent; btn.textContent = '已複製 ✓'; setTimeout(() => btn.textContent = old, 1500); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(() => fallbackCopy(url, done));
  } else {
    fallbackCopy(url, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); } catch (e) {}
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function fmtTime(start, end) {
  const s = String(start || '').slice(11, 16);
  const e = String(end   || '').slice(11, 16);
  if (!s) return '';
  return e ? s + ' – ' + e : s;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
