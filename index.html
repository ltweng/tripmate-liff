<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TripMate</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep:        #0B2B4E;
      --deep-mid:    #163D63;
      --ocean:       #1A73C0;
      --teal:        #1BAFBF;
      --teal-light:  #E3F7F9;
      --coral:       #D95F42;
      --coral-light: #FDF0EC;
      --bg:          #EEF5FB;
      --card:        #FFFFFF;
      --text:        #0B2342;
      --muted:       #587A9A;
      --border:      #C2D9ED;
      --chosen-bg:   #E3F7F9;
      --divider:     #DCE9F4;
      --radius:      18px;
      --radius-sm:   12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', -apple-system, 'Noto Sans TC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    h1, h2, .headline { font-family: 'Fraunces', 'Noto Sans TC', serif; }

    /* ── Header ───────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 20;
      background: var(--deep);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    #brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #brand h1 { font-size: 18px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.2px; white-space: nowrap; }
    #brand .wave { font-size: 20px; flex-shrink: 0; }
    #view-title { font-size: 12px; color: rgba(255,255,255,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #hamburger {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 18px; cursor: pointer;
    }
    #back-btn {
      flex-shrink: 0; background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 0 4px;
    }

    /* ── Drawer ───────────────────────────────────────── */
    #drawer-backdrop {
      position: fixed; inset: 0; background: rgba(11,35,66,0.4);
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 29;
    }
    #drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    #drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 78%; max-width: 300px;
      background: var(--deep); z-index: 30; padding: 20px 0;
      transform: translateX(100%); transition: transform 0.22s ease-out;
      overflow-y: auto;
    }
    #drawer.open { transform: translateX(0); }
    .drawer-header { padding: 0 20px 16px; color: #fff; }
    .drawer-header .name { font-weight: 700; font-size: 15px; }
    .drawer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 20px; color: rgba(255,255,255,0.85); font-weight: 700; font-size: 14px;
      cursor: pointer; user-select: none;
    }
    .drawer-item:active { background: rgba(255,255,255,0.08); }
    .drawer-item .emoji { font-size: 18px; width: 22px; text-align: center; }
    .drawer-item.active { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Shared states ────────────────────────────────── */
    #loading, .no-items {
      text-align: center; padding: 64px 24px; font-size: 14px; color: var(--muted);
    }
    .no-items p { margin-top: 6px; font-size: 12px; }
    .view-loading { text-align: center; padding: 48px 0; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 14px;
      border: 3px solid var(--divider); border-top-color: var(--teal); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { padding: 14px 14px 40px; }

    /* ── Pill tabs / filter chips (shared) ───────────── */
    .pill-tabs {
      display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px; margin-bottom: 12px; overflow-x: auto;
      scrollbar-width: none; /* Firefox — hide the grey scrollbar (E2) */
    }
    .pill-tabs::-webkit-scrollbar { display: none; } /* WebKit — hide it too (E2) */
    .pill-tab {
      flex: 1; min-width: 64px; padding: 8px 6px; font-size: 12.5px; font-weight: 700;
      text-align: center; border-radius: 999px; color: var(--muted); cursor: pointer; white-space: nowrap;
    }
    .pill-tab.active { background: var(--deep); color: #fff; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip {
      font-size: 12px; font-weight: 700; padding: 6px 13px; border-radius: 999px;
      background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    }
    .chip.active { background: var(--deep); color: #fff; border-color: var(--deep); }

    /* ── Card (item / mission) ───────────────────────── */
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .card.mission  { border-left: 4px solid var(--coral); }
    .card.chosen   { background: var(--chosen-bg); border-color: var(--teal); }
    .card.alt-item { border-left: 4px solid var(--teal); }
    .card-cover { width: 100%; height: 120px; object-fit: cover; display: block; background: var(--bg); }
    .card-body { padding: 13px 14px; }
    .card-top  { display: flex; align-items: flex-start; gap: 10px; }
    .cat-icon {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--bg);
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .card.mission .cat-icon { background: var(--coral-light); }
    .card.chosen  .cat-icon { background: rgba(27,175,191,0.12); }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; word-break: break-word; }
    .card-time  { font-size: 11px; color: var(--muted); margin-bottom: 1px; }
    .card-note  { font-size: 12px; color: #4A6680; margin-top: 5px; white-space: pre-wrap; word-break: break-word; }
    .card-reward { font-size: 12px; color: var(--coral); font-weight: 700; margin-top: 4px; }
    .pill { display: inline-block; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; margin-left: 5px; vertical-align: middle; }
    .pill-done   { background: var(--teal-light); color: #0A7A8A; }
    .pill-active { background: var(--coral-light); color: #B04530; }
    .pill-muted  { background: var(--border); color: var(--muted); }
    .trip-tag { color: #fff; }
    .card-actions { padding: 0 14px 13px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 110px; padding: 10px 12px; border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.12s, transform 0.1s;
    }
    .btn:active:not(:disabled) { opacity: 0.75; transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-coral  { background: var(--coral); color: #fff; }
    .btn-teal   { background: var(--teal);  color: #fff; }
    .btn-ghost  { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-block  { width: 100%; }
    .alt-header { display: flex; align-items: center; gap: 6px; padding: 6px 4px 3px; font-size: 11px; font-weight: 800; color: var(--teal); text-transform: uppercase; letter-spacing: 0.5px; }
    .alt-divider { border: none; border-top: 1px solid var(--divider); margin: 4px 0; }
    .inline-success { font-size: 13px; font-weight: 700; color: var(--teal); }

    /* ── Section / day headers ────────────────────────── */
    .section-title { font-size: 15px; font-weight: 700; margin: 4px 0 10px; font-family: 'Fraunces', serif; }
    .day-header {
      display: flex; align-items: center; gap: 8px; margin: 14px 0 8px; cursor: pointer; user-select: none;
    }
    .day-circle {
      width: 26px; height: 26px; border-radius: 50%; background: var(--deep); color: #fff;
      font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .day-circle-undated { background: var(--border); color: var(--muted); }
    .day-label { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
    .day-toggle { font-size: 11px; color: var(--muted); }
    .day-items.collapsed { display: none; }

    /* ── Home ─────────────────────────────────────────── */
    .hero-card {
      background: linear-gradient(135deg, var(--deep), var(--ocean));
      border-radius: var(--radius); padding: 20px; color: #fff; margin-bottom: 14px;
    }
    .hero-trip-name { font-size: 20px; font-weight: 700; font-family: 'Fraunces', serif; }
    .hero-meta { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .countdown-badge {
      display: inline-block; margin-top: 10px; background: rgba(255,255,255,0.15);
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 700;
    }
    #home-trip-select {
      width: 100%; margin-bottom: 12px; padding: 9px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--card); font-size: 13px; font-weight: 700; font-family: inherit;
    }
    .member-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--border); object-fit: cover; flex-shrink: 0; }
    .stub-card { background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── Trip cards (Trips overview) ──────────────────── */
    .trip-card {
      border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border);
      background: var(--card); cursor: pointer;
    }
    .trip-card-cover { height: 90px; background: #B4CDE6; background-size: cover; background-position: center; }
    .trip-card-body { padding: 12px 14px; }
    .trip-card-name { font-weight: 700; font-size: 15px; }
    .trip-card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Roster ───────────────────────────────────────── */
    .roster-card { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .roster-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border); object-fit: cover; flex-shrink: 0; }
    .roster-name { font-weight: 700; font-size: 14px; }
    .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
    .tag { font-size: 10px; font-weight: 700; background: var(--bg); color: var(--muted); padding: 2px 8px; border-radius: 999px; }

    /* ── Achievements ─────────────────────────────────── */
    .achv-card { text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 16px; color: var(--muted); }
    .achv-item-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .achv-item-card.locked .achv-emoji { filter: grayscale(1); opacity: 0.55; }
    .achv-item-card.locked .achv-title { color: var(--muted); }
    .achv-top { display: flex; align-items: center; gap: 10px; }
    .achv-emoji { font-size: 24px; flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .achv-title { font-weight: 700; font-size: 14.5px; }
    .achv-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .achv-progress { font-size: 11px; color: var(--teal); font-weight: 700; margin-top: 5px; }

    /* ── Packing list ─────────────────────────────────── */
    .pack-category { margin-bottom: 14px; }
    .pack-category-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--deep-mid); }
    .pack-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text); }
    .pack-item input { width: 16px; height: 16px; }
    .pack-note { font-size: 11px; color: var(--muted); margin: -4px 0 10px; }

    /* ── Onboarding ───────────────────────────────────── */
    #onboarding-wrap { padding: 40px 20px; max-width: 420px; margin: 0 auto; }
    .ob-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; font-family: 'Fraunces', serif; }
    .ob-text { font-size: 14px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
    .ob-input {
      width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      font-size: 15px; margin-bottom: 14px; font-family: inherit;
    }
    .agreement-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--divider); font-size: 13.5px;
    }
    .agreement-item input { width: 18px; height: 18px; margin-top: 1px; flex-shrink: 0; }
    .ob-nudge { color: var(--coral); font-size: 13px; font-weight: 700; margin-top: 10px; text-align: center; }

    /* ── Profile ──────────────────────────────────────── */
    .profile-header { text-align: center; padding: 20px 0 24px; }
    .profile-avatar { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; background: var(--border); margin: 0 auto 10px; }
    .profile-name { font-size: 18px; font-weight: 700; }

    /* ── Toast (ported from organiser.html — LINE suppresses alert()) ──── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--deep); color: #fff; font-size: 13px; font-weight: 700;
      padding: 10px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; z-index: 50; max-width: 90%; text-align: center;
    }
    .toast.show { opacity: 1; }

    /* ── Item detail modal ────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(11,42,66,0.5); z-index: 60;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card); width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto;
      border-radius: 20px 20px 0 0; padding: 0 0 20px; animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
    .modal-cover { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--bg); border-radius: 20px 20px 0 0; }
    .modal-head { display: flex; align-items: flex-start; gap: 10px; padding: 16px 18px 4px; }
    .modal-title { font-size: 18px; font-weight: 700; font-family: 'Fraunces', serif; flex: 1; word-break: break-word; }
    .modal-close {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg);
      font-size: 16px; color: var(--muted); cursor: pointer; line-height: 1;
    }
    .modal-body { padding: 4px 18px 0; }
    .detail-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--divider); font-size: 13.5px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { flex-shrink: 0; width: 76px; color: var(--muted); font-weight: 700; }
    .detail-val { flex: 1; word-break: break-word; white-space: pre-wrap; }
    .detail-val a { color: var(--teal); font-weight: 700; text-decoration: none; }
    .modal-actions { padding: 14px 18px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="item-modal" class="modal-overlay" onclick="if(event.target===this)closeItemModal()"></div>

<div id="header">
  <div id="brand">
    <button id="back-btn" style="display:none" onclick="handleBack()">←</button>
    <span class="wave">🌊</span>
    <div>
      <h1>TripMate</h1>
      <div id="view-title"></div>
    </div>
  </div>
  <button id="hamburger" onclick="toggleDrawer()" style="display:none">☰</button>
</div>

<div id="drawer-backdrop" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-header">
    <div class="name" id="drawer-name"></div>
  </div>
  <div class="drawer-item" data-view="home" onclick="navigateTo('home')"><span class="emoji">🏠</span>首頁 Homepage</div>
  <div class="drawer-item" data-view="trips" onclick="navigateTo('trips')"><span class="emoji">🧳</span>行程 Trips</div>
  <div class="drawer-item" data-view="roster" onclick="navigateTo('roster')"><span class="emoji">👥</span>成員 Roster</div>
  <div class="drawer-item" data-view="missions" onclick="navigateTo('missions')"><span class="emoji">🎯</span>任務 Missions</div>
  <div class="drawer-item" data-view="achievements" onclick="navigateTo('achievements')"><span class="emoji">🏅</span>成就 Achievements</div>
  <div class="drawer-item" data-view="packing" onclick="navigateTo('packing')"><span class="emoji">🎒</span>打包清單 Packing List</div>
  <div class="drawer-item" data-view="profile" onclick="navigateTo('profile')"><span class="emoji">🙂</span>個人檔案 Profile</div>
</div>

<div id="loading"><div class="spinner"></div>載入中…</div>
<div id="app" style="display:none"></div>

<script>
// ── CONFIG — only non-secret values live here ────────────────────────────────
const CONFIG = {
  liffId: '2010468064-uKRXbFfR', // participant LIFF app's own ID (per "LIFF ID.md"; 4RvCpshe is the ORGANISER app)
  gasUrl: 'https://script.google.com/macros/s/AKfycbx4yqj479yhsIAOUBkIWFKNvlKFnTCVZQ18uyiaxXtoGXJURpZ0bw26zgBsiqYu2rjQ/exec'
  // No secret here — GAS verifies the LINE ID token (liff.getIDToken) server-side
  // against LINE's verify endpoint; the userId param is just a legacy fallback.
};
// ─────────────────────────────────────────────────────────────────────────────

const EMOJI = {
  'Transportation':'✈️','Attraction':'🏛️','Restaurant':'🍽️','Shopping':'🛍️',
  'Accommodation':'🏨','Note':'📝','Task':'📋','Mission':'🎯'
};

const VIEW_TITLES = {
  home: '首頁', trips: '行程', tripDetail: '', roster: '成員', missions: '任務',
  achievements: '成就', packing: '打包清單', profile: '個人檔案', onboarding: ''
};

// Expense is intentionally omitted from the participant view (E1) — the feature
// isn't built yet and lives only on the organiser panel. Removing it also lets
// the remaining five tabs fit at 375px without the tab bar overflowing (E2).
const TRIP_TABS = [
  ['overview', '總覽'], ['itinerary', '行程'], ['locations', '地點'],
  ['mission', '任務'], ['packing', '打包']
];

const PACKING_MASTER = [
  { cat: '文件', items: ['護照', '住宿預約確認紀錄', '簽證', '入境登記', '電子機票', '登機證', '車程預訂'] },
  { cat: '衣物', items: ['T-shirt', '襯衫', '內衣褲', '長褲', '短褲', '裙子', '外套', '大衣', '泳衣', '泳帽', '泳鏡', '帽子', '手套', '圍巾', '鞋子', '室內拖', '室外拖', '太陽眼鏡', '毛巾衣'] },
  { cat: '電器', items: ['平板', '平板充電器', '手機', '手機充電器', '筆電', '筆電充電器', '行充', '耳機', '行李秤', '電池', '轉接頭'] },
  { cat: '沐浴用品', items: ['洗髮乳', '潤髮乳', '洗面乳', '面膜', '化妝水', '面霜', '沐浴乳', '乳液', '浴巾', '牙刷', '牙膏', '牙線', '護唇膏', '棉花棒'] },
  { cat: '潛水用品', items: ['濕衣', '面鏡', '套鞋', '蛙鞋', '潛水電腦表', '潛水電腦表充電器', '潛水手電筒'] },
  { cat: '雜物', items: ['OK蹦', '梳子', '髮圈、夾子', '衛生紙', '濕紙巾', '頸枕', '防曬乳', '購物袋', '塑膠袋', '夾鏈袋'] },
  { cat: '藥品', items: ['暈船藥', '止痛藥', '感冒藥'] }
];

const DEFAULT_TRIP_COVER = '#B4CDE6';
const TRIP_COLOR_PALETTE = ['#1BAFBF', '#D95F42', '#5B8DBF', '#7A6FD9', '#3FAE7A', '#C9A227'];

// ── Global state ──────────────────────────────────────────────────────────────
let currentUser  = null;
let currentView  = 'onboarding';
let currentTrip  = null;      // Trip code, when currentView === 'tripDetail'
let currentTripTab = 'overview';
let missionParam = null;

let myTrips = [];             // cache, from getMyTrips
let rosterCache = null;       // cache, from getRoster
let tripItemsCache = {};      // trip -> items (getTimeline scope=all)
let missionsCache = null;     // cache, from getMyMissions
let achievementsCache = null; // cache, from getAchievements
let packingCache = {};        // trip -> items (getMyPacking); cleared on toggle
const ITEM_REGISTRY = {};     // rowIndex -> item, populated by buildCard for the detail modal

// Onboarding state
let ob = { stage: 1, trip: null, tripInput: '', clauses: [], nicknameDraft: '', error: '' };

// ── Init ──────────────────────────────────────────────────────────────────────

// Wraps a promise with a deadline so a hung liff.init()/fetch() surfaces a
// visible error instead of leaving the page stuck on the static "載入中…"
// forever with no signal of what actually failed.
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(label + ' 超過 ' + (ms / 1000) + ' 秒未回應，請檢查網路連線')), ms))
  ]);
}

async function init() {
  try {
    await withTimeout(liff.init({ liffId: CONFIG.liffId }), 15000, 'liff.init()');
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await withTimeout(liff.getProfile(), 10000, 'liff.getProfile()');
    currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
    // ID token for server-side identity verification (security fix C1); null
    // until the LIFF app has the openid scope, which the server tolerates
    // while LINE_LOGIN_CHANNEL_ID is unset.
    currentUser.idToken = (typeof liff.getIDToken === 'function' ? liff.getIDToken() : null) || '';
    document.getElementById('drawer-name').textContent = profile.displayName;

    const params = new URLSearchParams(window.location.search);
    missionParam = params.get('mission');
    const qView     = params.get('view');
    const qTrip     = params.get('trip');
    const qTab      = params.get('tab');
    const qRegister = params.get('register');

    // Universal-roster invite link (?register=1): silently register into
    // Participants before anything else — no passcode needed for the roster
    // itself. Failure is non-fatal: joinTrip self-registers as a backstop.
    if (qRegister) { try { await apiPost('register'); } catch (e) { /* backstopped by joinTrip */ } }

    await withTimeout(refreshMyTrips(), 10000, 'getMyTrips API');

    if (!myTrips.length) {
      startOnboarding(!!qRegister);
    } else if (missionParam) {
      navigateTo('missions');
      setTimeout(() => scrollToMission(missionParam), 400);
    } else if (qView && qView !== 'onboarding') {
      navigateTo(qView, { trip: qTrip, tab: qTab });
    } else {
      navigateTo('home');
    }
  } catch (err) {
    document.getElementById('loading').innerHTML = '<div class="no-items">初始化失敗: ' + esc(err.message) + '</div>';
  }
}

async function refreshMyTrips() {
  const res = await apiGet('getMyTrips');
  myTrips = res.trips || [];
}

async function ensureRoster(force) {
  if (rosterCache && !force) return rosterCache;
  const res = await apiGet('getRoster');
  rosterCache = res.roster || [];
  return rosterCache;
}

async function ensureTripItems(trip, force) {
  if (tripItemsCache[trip] && !force) return tripItemsCache[trip];
  const res = await apiGet('getTimeline', { trip, scope: 'all' });
  tripItemsCache[trip] = res.items || [];
  return tripItemsCache[trip];
}

async function ensureMissions(force) {
  if (missionsCache && !force) return missionsCache;
  const res = await apiGet('getMyMissions');
  missionsCache = res.missions || [];
  return missionsCache;
}

async function ensureAchievements(force) {
  if (achievementsCache && !force) return achievementsCache;
  const res = await apiGet('getAchievements');
  achievementsCache = res.achievements || [];
  return achievementsCache;
}

async function ensurePacking(trip, force) {
  if (packingCache[trip] && !force) return packingCache[trip];
  const res = await apiGet('getMyPacking', { trip });
  packingCache[trip] = res.items || [];
  return packingCache[trip];
}

// ── API helpers ───────────────────────────────────────────────────────────────

// A rejected ID token (expired mid-session — LINE issues them with a ~1h life
// and liff only mints a fresh one on page load) can't be fixed by retrying;
// the only recovery is reopening the LIFF. Catch it centrally so the user
// sees an instruction instead of a suppressed alert().
function handleTokenExpiry(result) {
  if (result && result.error === 'Unauthorized' && result.reason === 'token') {
    document.getElementById('app').innerHTML =
      '<div class="no-items">登入憑證已過期，請關閉此頁面後重新開啟 🙏</div>';
    return true;
  }
  return false;
}

// LINE's in-app browser silently suppresses alert(), so failed actions vanished
// with no feedback (audit B5). Route all user-facing messages through a toast.
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

async function apiGet(action, params) {
  const qs = new URLSearchParams(Object.assign({
    action,
    userId: currentUser ? currentUser.userId : '',
    idToken: currentUser ? currentUser.idToken : ''
  }, params || {}));
  const res = await fetch(CONFIG.gasUrl + '?' + qs.toString());
  const result = await res.json();
  handleTokenExpiry(result);
  return result;
}

async function apiPost(action, body) {
  const res = await fetch(CONFIG.gasUrl, {
    method: 'POST',
    // text/plain avoids a CORS preflight (OPTIONS), which Apps Script Web Apps
    // don't implement — doPost still JSON.parses the raw body regardless of header.
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    // displayName/pictureUrl ride along on every call (ignored by actions that
    // don't need them) so joinTrip can self-register a brand-new LINE user —
    // see PUBLIC_ACTIONS_POST in Code.gs for why that registration has to
    // happen there instead of only via the OA follow webhook.
    body: JSON.stringify(Object.assign({
      action,
      userId: currentUser ? currentUser.userId : '',
      idToken: currentUser ? currentUser.idToken : '',
      displayName: currentUser ? currentUser.displayName : '',
      pictureUrl: currentUser ? currentUser.pictureUrl : ''
    }, body || {}))
  });
  const result = await res.json();
  handleTokenExpiry(result);
  return result;
}

// ── Navigation / router ────────────────────────────────────────────────────────

function navigateTo(view, opts) {
  opts = opts || {};
  currentView = view;
  if (view === 'tripDetail') {
    if (opts.trip) currentTrip = opts.trip;
    currentTripTab = opts.tab || 'overview';
  }
  closeDrawer();

  const qs = new URLSearchParams();
  qs.set('view', view);
  if (view === 'tripDetail' && currentTrip) { qs.set('trip', currentTrip); qs.set('tab', currentTripTab); }
  history.replaceState(null, '', '?' + qs.toString());

  render();
}

function handleBack() {
  navigateTo('trips');
}

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawer-backdrop').classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}

function updateHeader() {
  const hamburger = document.getElementById('hamburger');
  const backBtn   = document.getElementById('back-btn');
  const titleEl   = document.getElementById('view-title');
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.toggle('active', el.dataset.view === currentView));

  if (currentView === 'onboarding') {
    hamburger.style.display = 'none';
    backBtn.style.display = 'none';
    titleEl.textContent = '';
    return;
  }
  hamburger.style.display = 'block';
  backBtn.style.display = currentView === 'tripDetail' ? 'block' : 'none';
  titleEl.textContent = currentView === 'tripDetail' ? (currentTrip || '') : (VIEW_TITLES[currentView] || '');
}

// ── Render dispatcher ───────────────────────────────────────────────────────────

async function render() {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';
  updateHeader();

  if (currentView === 'onboarding') { renderOnboarding(); return; }

  app.innerHTML = '<div class="view-loading"><div class="spinner"></div></div>';
  try {
    if (currentView === 'home')         return await renderHome();
    if (currentView === 'trips')        return renderTrips();
    if (currentView === 'tripDetail')   return await renderTripDetail();
    if (currentView === 'roster')       return await renderRoster();
    if (currentView === 'missions')     return await renderMissions();
    if (currentView === 'achievements') return await renderAchievements();
    if (currentView === 'packing')      return await renderPackingGlobal();
    if (currentView === 'profile')      return await renderProfile();
  } catch (err) {
    app.innerHTML = '<div class="no-items">載入失敗<p>' + esc(err.message) + '</p></div>';
  }
}

// ── Onboarding (Landing page) ──────────────────────────────────────────────────

// fromRegister: arrived via the universal-roster invite link (?register=1) —
// they're already in Participants, so the passcode step is optional for them
// and gets welcome copy + a skip button instead of the hard gate.
function startOnboarding(fromRegister) {
  ob = { stage: 1, trip: null, tripInput: '', clauses: [], nicknameDraft: '', error: '', fromRegister: !!fromRegister };
  navigateTo('onboarding');
}

function obSkipToHome() {
  navigateTo('home');
}

// "＋ 加入行程 Join Trip" on the Trips page: start the onboarding flow at the
// passcode-entry step so an existing participant can join an additional trip by
// entering its code. Same entry point as the empty-Home CTA — just a clearer
// name at the call site.
function startJoinTrip() {
  startOnboarding(false);
}

function renderOnboarding() {
  const app = document.getElementById('app');
  const wrap = document.createElement('div');
  wrap.id = 'onboarding-wrap';

  if (ob.stage === 1) {
    wrap.innerHTML =
      (ob.fromRegister
        ? '<div class="ob-title">✓ 歡迎加入 TripMate！</div>' +
          '<div class="ob-text">您已成功登記。若主辦人有給您行程通關密語，輸入後即可加入行程；沒有也沒關係，之後隨時可以加入。</div>'
        : '<div class="ob-title">加入行程 🌊</div>' +
          '<div class="ob-text">請輸入行程通關密語（由主辦人提供）</div>') +
      '<input class="ob-input" id="ob-passcode" placeholder="例如 Trip2026" value="' + esc(ob.tripInput) + '">' +
      (ob.error ? '<div class="ob-nudge">這個行程尚不存在，請聯絡活動主持人預約行程！</div>' : '') +
      '<button class="btn btn-coral btn-block" onclick="obSubmitPasscode()">加入</button>' +
      (ob.fromRegister
        ? '<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="obSkipToHome()">我還沒有通關密語，稍後再加入</button>'
        : '');
    app.innerHTML = '';
    app.appendChild(wrap);
    return;
  }

  if (ob.stage === 3) {
    wrap.innerHTML =
      '<div class="ob-title">您好，' + esc(currentUser.displayName) + '</div>' +
      '<div class="ob-text">您目前的使用者名稱為「' + esc(currentUser.displayName) + '」，請問您想以這個名稱行走江湖嗎？</div>' +
      '<button class="btn btn-teal btn-block" style="margin-bottom:10px" onclick="obConfirmName(true)">是，就用這個名字</button>' +
      '<button class="btn btn-ghost btn-block" onclick="obConfirmName(false)">否，我想改名</button>' +
      '<div id="ob-nickname-wrap" style="display:none; margin-top:14px">' +
        '<div class="ob-text">請問您想以何種面目示人？</div>' +
        '<input class="ob-input" id="ob-nickname" maxlength="20" placeholder="輸入暱稱">' +
        '<button class="btn btn-coral btn-block" onclick="obSubmitNickname()">送出</button>' +
      '</div>';
    app.innerHTML = '';
    app.appendChild(wrap);
    return;
  }

  if (ob.stage === 4) {
    const checkedCount = ob.clauses.filter(c => c.checked).length;
    wrap.innerHTML =
      '<button class="btn btn-ghost" style="margin-bottom:14px" onclick="obBackToName()">← 返回上一步</button>' +
      '<div class="ob-title">' + esc(ob.trip) + ' 旅行公約</div>' +
      '<div class="ob-text">請勾選所有您可以一同遵守的條文</div>' +
      ob.clauses.map((c, i) =>
        '<label class="agreement-item">' +
          '<input type="checkbox" ' + (c.checked ? 'checked' : '') + ' onchange="obToggleClause(' + i + ')">' +
          '<span>' + esc(c.text) + '</span>' +
        '</label>'
      ).join('') +
      '<button class="btn btn-coral btn-block" style="margin-top:16px" onclick="obSignAgreement()">簽署旅行公約</button>' +
      (ob.error ? '<div class="ob-nudge">請提高配合度，一同創造快樂的旅程！</div>' : '');
    app.innerHTML = '';
    app.appendChild(wrap);
    return;
  }
}

async function obSubmitPasscode() {
  const input = document.getElementById('ob-passcode');
  const trip = input.value.trim();
  if (!trip) return;
  ob.tripInput = trip;

  const result = await apiPost('joinTrip', { trip });
  if (result.error === 'notFound') { ob.error = true; renderOnboarding(); return; }
  if (result.error) { showToast('錯誤: ' + result.error); return; }

  ob.trip = trip;
  ob.error = '';

  if (result.alreadyJoined && result.agreementSignedAt) {
    await refreshMyTrips();
    navigateTo('home');
    return;
  }
  if (result.alreadyJoined && !result.agreementSignedAt) {
    await obLoadAgreement();
    return;
  }
  ob.stage = 3;
  renderOnboarding();
}

function obConfirmName(useLineName) {
  if (useLineName) { obLoadAgreement(); return; }
  document.getElementById('ob-nickname-wrap').style.display = 'block';
}

async function obSubmitNickname() {
  const nickname = document.getElementById('ob-nickname').value.trim();
  if (!nickname) return;
  const result = await apiPost('updateNickname', { nickname });
  if (result.error) { showToast('錯誤: ' + result.error); return; }
  currentUser.displayName = nickname;
  document.getElementById('drawer-name').textContent = nickname;
  obLoadAgreement();
}

async function obLoadAgreement() {
  const res = await apiGet('getTripAgreement', { trip: ob.trip });
  if (res.error) { showToast('找不到這個行程的旅行公約設定'); return; }
  ob.clauses = (res.clauses || []).map(text => ({ text, checked: false }));
  ob.stage = 4;
  ob.error = '';
  renderOnboarding();
}

function obToggleClause(i) {
  ob.clauses[i].checked = !ob.clauses[i].checked;
}

// Trip is already joined and the name choice already made by the time stage 4
// renders — going back just re-shows the name step so the user can change
// their mind; it doesn't re-run joinTrip or clear anything already saved.
function obBackToName() {
  ob.stage = 3;
  ob.error = '';
  renderOnboarding();
}

async function obSignAgreement() {
  const total = ob.clauses.length;
  const checked = ob.clauses.filter(c => c.checked).length;
  const result = await apiPost('signAgreement', { trip: ob.trip, checkedCount: checked, totalCount: total });
  if (result.error === 'notEnoughChecked') { ob.error = true; renderOnboarding(); return; }
  if (result.error) { showToast('錯誤: ' + result.error); return; }

  await refreshMyTrips();
  navigateTo('home');
}

// ── Home ────────────────────────────────────────────────────────────────────────

let homeSelectedTrip = null;

async function renderHome() {
  const app = document.getElementById('app');
  if (!myTrips.length) {
    app.innerHTML =
      '<div class="no-items">尚未加入任何行程</div>' +
      '<button class="btn btn-coral btn-block" style="margin-top:14px" onclick="startOnboarding()">輸入通關密語加入行程</button>';
    return;
  }

  if (!homeSelectedTrip || !myTrips.some(t => t['Trip'] === homeSelectedTrip)) {
    const dated = myTrips.filter(t => t['Start Date']);
    // Prefer trips that haven't ended yet (End Date today or later), soonest
    // start first; otherwise fall back to the most recently finished trip (B1).
    const active = dated
      .filter(t => daysUntil(t['End Date'] || t['Start Date']) >= 0)
      .sort((a, b) => daysUntil(a['Start Date']) - daysUntil(b['Start Date']));
    const recentPast = dated
      .slice()
      .sort((a, b) => daysUntil(b['Start Date']) - daysUntil(a['Start Date']));
    homeSelectedTrip = (active[0] || recentPast[0] || myTrips[0])['Trip'];
  }
  const trip = myTrips.find(t => t['Trip'] === homeSelectedTrip);
  const items = await ensureTripItems(homeSelectedTrip);
  const roster = await ensureRoster();

  const countdown = daysUntil(trip['Start Date']);
  const upcoming = items
    .filter(it => it['Start Time'] && it['Start Time'] >= _nowLocalStr())
    .sort((a, b) => a['Start Time'].localeCompare(b['Start Time']))
    .slice(0, 3);
  const members = roster.filter(r => r.trips && r.trips.indexOf(homeSelectedTrip) >= 0);

  const app2 = document.createElement('div');
  app2.innerHTML =
    '<select id="home-trip-select" onchange="homeSelectedTrip=this.value; render()">' +
      myTrips.map(t => '<option value="' + esc(t['Trip']) + '"' + (t['Trip'] === homeSelectedTrip ? ' selected' : '') + '>' + esc(t['Location'] || t['Trip']) + '</option>').join('') +
    '</select>' +
    '<div class="hero-card" style="cursor:pointer" onclick="navigateTo(\'tripDetail\',{trip:\'' + esc(homeSelectedTrip) + '\'})">' +
      '<div class="hero-trip-name">' + esc(trip['Location'] || trip['Trip']) + '</div>' +
      '<div class="hero-meta">' + esc(trip['Start Date'] || '') + (trip['End Date'] ? ' → ' + esc(trip['End Date']) : '') + '</div>' +
      (countdown != null ? '<div class="countdown-badge">' + (
          countdown > 0 ? '倒數 ' + countdown + ' 天'
          : countdown === 0 ? '就是今天！'
          // Start date passed — "進行中" only while today is still within the
          // trip; after the end date it's "已結束", not ongoing (B2).
          : (daysUntil(trip['End Date'] || trip['Start Date']) >= 0 ? '進行中' : '已結束')
        ) + '</div>' : '') +
    '</div>' +
    '<div class="section-title">✨ 精選行程</div>' +
    '<div id="home-highlights"></div>' +
    '<div class="section-title">🎒 打包清單</div>' +
    '<div id="home-packing"></div>' +
    '<div class="section-title">👥 成員</div>' +
    '<div id="home-members"></div>';
  app.innerHTML = '';
  app.appendChild(app2);

  renderItemList(document.getElementById('home-highlights'), upcoming, '目前沒有即將到來的行程');
  renderHomePacking(homeSelectedTrip);
  const membersEl = document.getElementById('home-members');
  if (!members.length) { membersEl.innerHTML = '<div class="no-items" style="padding:20px">尚無成員</div>'; }
  else members.forEach(m => {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = (m.pictureUrl ? '<img class="avatar" src="' + esc(m.pictureUrl) + '">' : '<div class="avatar"></div>') + esc(m.displayName);
    membersEl.appendChild(row);
  });
}

// Home packing preview: a compact progress line + shortcut into the trip's
// Packing tab (the real check-off UI). Loaded after the Home skeleton so a slow
// packing fetch doesn't hold up the rest of the page.
async function renderHomePacking(trip) {
  const el = document.getElementById('home-packing');
  if (!el) return;
  try {
    const items = await ensurePacking(trip);
    if (!items.length) { el.innerHTML = '<div class="stub-card">這趟行程還沒有打包清單項目</div>'; return; }
    const done = items.filter(it => it.checked).length;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.onclick = () => navigateTo('tripDetail', { trip, tab: 'packing' });
    card.innerHTML =
      '<div class="card-body">' +
        '<div style="font-weight:700;font-size:14px">已打包 ' + done + ' / ' + items.length + ' 項</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-top:4px">點此查看並勾選打包清單 →</div>' +
      '</div>';
    el.innerHTML = '';
    el.appendChild(card);
  } catch (err) {
    el.innerHTML = '<div class="stub-card">打包清單載入失敗</div>';
  }
}

// ── Trips overview + Trip (Individual) ───────────────────────────────────────────

let tripsFilter = 'all';

function renderTrips() {
  const app = document.getElementById('app');
  const today = _todayStr();
  const withStatus = myTrips.map(t => {
    let status = 'planning';
    if (t['Start Date'] && t['End Date']) {
      if (t['End Date'] < today) status = 'completed';
      else if (t['Start Date'] > today) status = 'upcoming';
      else status = 'ongoing';
    }
    return Object.assign({}, t, { _status: status });
  });
  const filtered = tripsFilter === 'all' ? withStatus : withStatus.filter(t => t._status === tripsFilter);

  const wrap = document.createElement('div');
  wrap.innerHTML =
    '<div class="chips">' +
      [['all','全部'], ['upcoming','即將'], ['ongoing','進行中'], ['completed','已完成'], ['planning','規劃中']].map(([k, label]) =>
        '<div class="chip' + (tripsFilter === k ? ' active' : '') + '" onclick="tripsFilter=\'' + k + '\'; render()">' + label + '</div>'
      ).join('') +
    '</div>' +
    '<button class="btn btn-teal btn-block" style="margin-bottom:14px" onclick="startJoinTrip()">＋ 加入行程 Join Trip</button>' +
    '<div id="trip-cards"></div>';
  app.innerHTML = '';
  app.appendChild(wrap);

  const cardsEl = document.getElementById('trip-cards');
  if (!filtered.length) { cardsEl.innerHTML = '<div class="no-items">沒有符合條件的行程</div>'; return; }
  filtered.forEach(t => {
    const card = document.createElement('div');
    card.className = 'trip-card';
    card.onclick = () => navigateTo('tripDetail', { trip: t['Trip'] });
    const coverStyle = t['Cover'] ? 'background-image:url(\'' + esc(t['Cover']) + '\')' : 'background:' + DEFAULT_TRIP_COVER;
    card.innerHTML =
      '<div class="trip-card-cover" style="' + coverStyle + '"></div>' +
      '<div class="trip-card-body">' +
        '<div class="trip-card-name">' + esc(t['Location'] || t['Trip']) + '</div>' +
        '<div class="trip-card-meta">' + esc(t['Start Date'] || '') + (t['End Date'] ? ' → ' + esc(t['End Date']) : '') + '</div>' +
      '</div>';
    cardsEl.appendChild(card);
  });
}

  const contentEl = document.getElementById('trip-tab-content');
  const items = await ensureTripItems(currentTrip);

    contentEl.innerHTML =

      '<div class="section-title">今日行程</div>' +
      '<div id="overview-today"></div>' +
      '<div class="section-title">成員</div>' +
      '<div id="overview-members"></div>';
    renderItemList(document.getElementById('overview-today'), todayItems, '今天沒有安排行程');
    const membersEl = document.getElementById('overview-members');
    if (!members.length) membersEl.innerHTML = '<div class="no-items" style="padding:16px">尚無成員</div>';
    else members.forEach(m => {
      const row = document.createElement('div'); row.className = 'member-row';
      row.innerHTML = (m.pictureUrl ? '<img class="avatar" src="' + esc(m.pictureUrl) + '">' : '<div class="avatar"></div>') + esc(m.displayName);
      membersEl.appendChild(row);
    });

  } else if (currentTripTab === 'itinerary') {
    contentEl.innerHTML = '';
    const groups = groupByDay(items);
    if (!groups.length) { contentEl.innerHTML = '<div class="no-items">尚無行程資料</div>'; return; }
    let dayNum = 0;
    groups.forEach((g) => {
      const dayWrap = document.createElement('div');
      const circle = g.dated
        ? '<div class="day-circle">' + (++dayNum) + '</div>'
        : '<div class="day-circle day-circle-undated">•</div>';
      dayWrap.innerHTML =
        '<div class="day-header" onclick="this.nextElementSibling.classList.toggle(\'collapsed\')">' +
          circle +
          '<div class="day-label">' + esc(g.day) + '</div>' +
          '<div class="day-toggle">▾</div>' +
        '</div>' +
        '<div class="day-items"></div>';
      contentEl.appendChild(dayWrap);
      renderItemList(dayWrap.querySelector('.day-items'), g.items, '');
    });

  } else if (currentTripTab === 'locations') {
    const locItems = items.filter(it => ['Attraction', 'Restaurant', 'Shopping'].indexOf(it['Category']) >= 0);
    contentEl.innerHTML = '';
    renderItemList(contentEl, locItems, '這趟行程還沒有景點／餐廳／購物地點');

  } else if (currentTripTab === 'mission') {
    renderTripMissionTab(contentEl, items, today);

  } else if (currentTripTab === 'packing') {
    await renderPackingChecklist(contentEl, currentTrip);
  }
}

// ── Packing checklist (per-user check-off, audit F7) ─────────────────────────────
// Shared by the trip-detail Packing tab and the global Packing view. Renders the
// trip's packing items grouped by category with live checkboxes whose state is
// saved per-user via togglePackingItem.
async function renderPackingChecklist(container, trip) {
  const items = await ensurePacking(trip);
  container.innerHTML = '';
  if (!items.length) {
    container.innerHTML = '<div class="no-items" style="padding:16px">這趟行程還沒有打包清單項目</div>';
    return;
  }

  const checkedCount = items.filter(it => it.checked).length;
  const summary = document.createElement('div');
  summary.className = 'pack-note';
  summary.id = 'pack-summary';
  summary.textContent = '已打包 ' + checkedCount + ' / ' + items.length + ' 項';
  container.appendChild(summary);

  const groups = {};
  items.forEach(it => { const c = it.Category || '其他'; (groups[c] = groups[c] || []).push(it); });
  Object.keys(groups).forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = 'pack-category';
    wrap.innerHTML = '<div class="pack-category-title">' + esc(cat) + '</div>';
    groups[cat].forEach(it => {
      const label = document.createElement('label');
      label.className = 'pack-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!it.checked;
      cb.onchange = () => togglePacking(trip, it, cb);
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + (it.Item || '')));
      if (it.Note) {
        const note = document.createElement('span');
        note.style.cssText = 'color:var(--muted);font-size:11px';
        note.textContent = ' · ' + it.Note;
        label.appendChild(note);
      }
      wrap.appendChild(label);
    });
    container.appendChild(wrap);
  });
}

async function togglePacking(trip, item, cb) {
  const desired = cb.checked;
  cb.disabled = true;
  try {
    const result = await apiPost('togglePackingItem', { trip, itemId: item.ID, checked: desired });
    if (result.ok) {
      item.checked = desired; // keep the cache in sync so re-renders stay correct
      const summaryEl = document.getElementById('pack-summary');
      if (summaryEl) {
        const items = packingCache[trip] || [];
        summaryEl.textContent = '已打包 ' + items.filter(it => it.checked).length + ' / ' + items.length + ' 項';
      }
    } else {
      cb.checked = !desired;
      showToast('錯誤: ' + (result.error || '請稍後再試'));
    }
  } catch (err) {
    cb.checked = !desired;
    showToast('網路錯誤: ' + err.message);
  } finally {
    cb.disabled = false;
  }
}

// ── Shared card / item-list builders ─────────────────────────────────────────────

function renderItemList(container, items, emptyMessage) {
  container.innerHTML = '';
  if (!items.length) {
    if (emptyMessage) container.innerHTML = '<div class="no-items" style="padding:16px">' + esc(emptyMessage) + '</div>';
    return;
  }
  const altBuckets = {};
  items.forEach(it => { const id = it['Alt Group ID']; if (id) (altBuckets[id] = altBuckets[id] || []).push(it); });
  const seenAlt = new Set();
  items.forEach(it => {
    const id = it['Alt Group ID'];
    if (id) {
      if (seenAlt.has(id)) return;
      seenAlt.add(id);
      container.appendChild(buildAltGroup(altBuckets[id]));
    } else {
      container.appendChild(buildCard(it, false));
    }
  });
}

function buildCard(item, inAltGroup, showTripTag) {
  const isMission = !!item['Is Mission'];
  const isDone    = !!item['Completed At'];
  const isChosen  = item['Is Chosen'] === true || item['Is Chosen'] === 'true';
  const rowIndex  = item['_rowIndex'] || 0;
  const emoji     = EMOJI[item['Category']] || '•';
  const timeStr   = fmtTime(item['Start Time'], item['End Time']);
  const note      = (item['Note']   || '').trim();
  const reward    = (item['Reward'] || '').trim();
  const cover     = (item['Cover']  || '').trim();

  const statusPill = isDone
    ? '<span class="pill pill-done">✓ 完成</span>'
    : (isMission && item['Triggered At'] ? '<span class="pill pill-active">進行中</span>' : (isMission ? '<span class="pill pill-muted">未觸發</span>' : ''));
  const tripTag = showTripTag && item['Trip'] ? '<span class="pill trip-tag" style="background:' + tripColor(item['Trip']) + '">' + esc(item['Trip']) + '</span>' : '';

  if (rowIndex) ITEM_REGISTRY[rowIndex] = item; // so the detail modal can look it up on click

  const card = document.createElement('div');
  card.className = 'card' + (isMission ? ' mission' : '') + (isChosen ? ' chosen' : '') + (inAltGroup && !isMission ? ' alt-item' : '');
  if (rowIndex) {
    card.dataset.rowIndex = rowIndex;
    card.style.cursor = 'pointer';
    card.onclick = () => openItemModal(rowIndex);
  }

  card.innerHTML =
    (cover ? '<img class="card-cover" src="' + esc(cover) + '" loading="lazy" alt="">' : '') +
    '<div class="card-body">' +
      '<div class="card-top">' +
        '<div class="cat-icon">' + emoji + '</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + esc(item['Item'] || '') + statusPill + tripTag + '</div>' +
          (timeStr ? '<div class="card-time">🕐 ' + timeStr + '</div>' : '') +
          (note    ? '<div class="card-note">'   + esc(note)   + '</div>' : '') +
          (reward  ? '<div class="card-reward">🎁 ' + esc(reward) + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';

  if (isMission && !isDone && item['Triggered At']) {
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    actions.onclick = (e) => e.stopPropagation(); // don't also open the detail modal
    actions.innerHTML = '<button class="btn btn-coral" onclick="completeMission(' + rowIndex + ', this)">完成任務</button>';
    card.appendChild(actions);
  }
  if (inAltGroup && !isChosen && !isDone) {
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    actions.onclick = (e) => e.stopPropagation(); // don't also open the detail modal
    actions.innerHTML = '<button class="btn btn-teal" onclick="chooseRestaurant(' + rowIndex + ', \'' + esc(item['Alt Group ID']) + '\', this)">選這家</button>';
    card.appendChild(actions);
  }
  return card;
}

function buildAltGroup(members) {
  const wrap = document.createElement('div');
  const time = fmtTime(members[0]['Start Time'], members[0]['End Time']);
  const hdr = document.createElement('div');
  hdr.className = 'alt-header';
  hdr.textContent = '🍽️ 餐廳選擇' + (time ? '  ·  ' + time : '');
  wrap.appendChild(hdr);
  members.forEach((m, i) => {
    if (i > 0) { const hr = document.createElement('hr'); hr.className = 'alt-divider'; wrap.appendChild(hr); }
    wrap.appendChild(buildCard(m, true));
  });
  return wrap;
}

// ── Item detail modal ─────────────────────────────────────────────────────────

function openItemModal(rowIndex) {
  const item = ITEM_REGISTRY[rowIndex];
  if (!item) return;
  const overlay = document.getElementById('item-modal');

  const isMission = !!item['Is Mission'];
  const isDone    = !!item['Completed At'];
  const isChosen  = item['Is Chosen'] === true || item['Is Chosen'] === 'true';
  const emoji     = EMOJI[item['Category']] || '•';
  const cover     = (item['Cover'] || '').trim();

  const rows = [];
  const add = (label, value, isHtml) => {
    if (!value && value !== 0) return;
    rows.push('<div class="detail-row"><div class="detail-label">' + esc(label) + '</div><div class="detail-val">' + (isHtml ? value : esc(String(value))) + '</div></div>');
  };

  const timeStr = fmtTime(item['Start Time'], item['End Time']);
  add('時間', timeStr);
  add('狀態', item['Status']);
  add('地區', [item['Area'], item['Sub Area']].filter(Boolean).join(' · '));
  add('說明', item['Note']);
  if (item['Reward']) add('獎勵', '🎁 ' + item['Reward']);
  add('營業時間', item['Open Hour']);
  add('公休', item['Closed on']);
  add('地址', item['Address']);
  add('電話', item['Phone']);
  if (item['Price']) add('價格', String(item['Price']) + (item['Currency'] ? ' ' + item['Currency'] : ''));

  const mapUrl = _mapsUrl(item);
  if (mapUrl) add('地圖', '<a href="' + esc(mapUrl) + '" target="_blank" rel="noopener">在 Google 地圖開啟 →</a>', true);
  if (item['Website']) add('網站', '<a href="' + esc(item['Website']) + '" target="_blank" rel="noopener">開啟網站 →</a>', true);

  const actions = [];
  if (isMission && !isDone && item['Triggered At']) {
    actions.push('<button class="btn btn-coral" onclick="modalCompleteMission(' + rowIndex + ')">完成任務</button>');
  }
  if (item['Alt Group ID'] && !isChosen && !isDone && item['Category'] === 'Restaurant') {
    actions.push('<button class="btn btn-teal" onclick="modalChooseRestaurant(' + rowIndex + ', \'' + esc(item['Alt Group ID']) + '\')">選這家</button>');
  }

  const statusPill = isDone ? '<span class="pill pill-done">✓ 完成</span>'
    : (isMission && item['Triggered At'] ? '<span class="pill pill-active">進行中</span>' : (isChosen ? '<span class="pill pill-done">已選</span>' : ''));

  overlay.innerHTML =
    '<div class="modal" onclick="event.stopPropagation()">' +
      (cover ? '<img class="modal-cover" src="' + esc(cover) + '" onerror="this.style.display=\'none\'" alt="">' : '') +
      '<div class="modal-head">' +
        '<div class="modal-title">' + emoji + ' ' + esc(item['Item'] || '') + ' ' + statusPill + '</div>' +
        '<button class="modal-close" onclick="closeItemModal()">✕</button>' +
      '</div>' +
      '<div class="modal-body">' + (rows.length ? rows.join('') : '<div class="detail-row"><div class="detail-val" style="color:var(--muted)">沒有更多細節</div></div>') + '</div>' +
      (actions.length ? '<div class="modal-actions">' + actions.join('') + '</div>' : '') +
    '</div>';
  overlay.classList.add('show');
}

function closeItemModal() {
  const overlay = document.getElementById('item-modal');
  overlay.classList.remove('show');
  overlay.innerHTML = '';
}

// Build a Google Maps link from whatever geo hint the item carries: a GM Page
// URL if it looks like one, otherwise a place search by address or name.
function _mapsUrl(item) {
  const gm = (item['GM Page'] || '').trim();
  if (/^https?:\/\//i.test(gm)) return gm;
  const q = (item['Address'] || '').trim() || (item['Item'] || '').trim();
  if (!q) return '';
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function groupByDay(items) {
  const groups = {};
  items.forEach(it => {
    const day = (it['Start Time'] || '').slice(0, 10) || '未定日期';
    if (!groups[day]) groups[day] = [];
    groups[day].push(it);
  });
  // Dated groups are numbered days, in chronological order. Undated items go in
  // a separate, *unnumbered* section at the end so they don't shift every real
  // day's number by one (audit B3).
  const datedDays = Object.keys(groups).filter(d => d !== '未定日期').sort();
  const result = datedDays.map(day => ({ day, items: groups[day], dated: true }));
  if (groups['未定日期']) result.push({ day: '未定日期', items: groups['未定日期'], dated: false });
  return result;
}

function clientMissionStatus(it, today) {
  if (it['Completed At']) return 'completed';
  if (it['Triggered At']) return 'inProgress';
  const start = (it['Start Time'] || '').replace(/-/g, '/');
  if (!it['Is Multi-day'] && start && start.slice(0, 10) < today) return 'expired';
  return 'new';
}

function tripColor(trip) {
  let hash = 0;
  for (let i = 0; i < trip.length; i++) hash = (hash * 31 + trip.charCodeAt(i)) >>> 0;
  return TRIP_COLOR_PALETTE[hash % TRIP_COLOR_PALETTE.length];
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const target = new Date(String(dateStr).slice(0, 10).replace(/\//g, '-'));
  const today = new Date(_todayStr().replace(/\//g, '-'));
  return Math.round((target - today) / 86400000);
}

function _todayStr() {
  const d = new Date();
  return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
}
function _nowLocalStr() {
  const d = new Date();
  return _todayStr() + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function fmtTime(start, end) {
  const sDate = String(start || '').slice(0, 10);
  const eDate = String(end   || '').slice(0, 10);
  const s = String(start || '').slice(11, 16);
  const e = String(end   || '').slice(11, 16);
  if (!s) return '';
  if (!e) return s;
  // Multi-day span: qualify each time with its date so a stay doesn't render as
  // a nonsensical "15:00 – 10:00" (audit B4).
  if (eDate && sDate && eDate !== sDate) {
    return fmtShortDate(sDate) + ' ' + s + ' → ' + fmtShortDate(eDate) + ' ' + e;
  }
  return s + ' – ' + e;
}

function fmtShortDate(d) {
  const p = String(d).replace(/-/g, '/').split('/');
  return p.length === 3 ? (parseInt(p[1], 10) + '/' + parseInt(p[2], 10)) : d;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToMission(rowIndex) {
  const card = document.querySelector('[data-row-index="' + rowIndex + '"]');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Mock mode (?mock=1) — local verification without a live GAS deployment.
// See mock/fixtures.js. Never active unless the URL explicitly opts in.
const MOCK_MODE = new URLSearchParams(location.search).get('mock') === '1';

function bootstrap() {
  if (!MOCK_MODE) { init(); return; }
  const s = document.createElement('script');
  s.src = '../mock/fixtures.js';
  s.onload = () => { window.installMockShims(); init(); };
  s.onerror = () => { document.getElementById('loading').innerHTML = '<div class="no-items">找不到 mock/fixtures.js</div>'; };
  document.head.appendChild(s);
}

bootstrap();
</script>
